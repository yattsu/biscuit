name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: false

      - name: Install PlatformIO Core
        run: uv pip install --system -U https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.19.zip

      - name: Build Biscuit
        run: pio run -e gh_release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Biscuit ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            .pio/build/gh_release/firmware.bin
            .pio/build/gh_release/bootloader.bin
            .pio/build/gh_release/partitions.bin

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Biscuit-${{ github.ref_name }}
          path: |
            .pio/build/gh_release/bootloader.bin
            .pio/build/gh_release/firmware.bin
            .pio/build/gh_release/partitions.bin
